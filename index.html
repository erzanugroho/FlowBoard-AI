<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flowboard — A modern minimalist multi-project Kanban board for productivity and project management.">
  <title>Flowboard — Kanban</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout" id="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">F</div>
        <span>Flowboard</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Menu</div>
          <a class="sidebar-item active" data-nav="projects" id="nav-projects">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
            Projects
          </a>
          <a class="sidebar-item" data-nav="recent">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            Recent
          </a>
          <a class="sidebar-item" data-nav="favorites">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>
            Favorites
          </a>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">General</div>
          <a class="sidebar-item" data-nav="settings" id="nav-settings">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
        </div>
      </nav>
      <div class="sidebar-bottom">
        <div class="save-status"><span class="save-dot"></span> Autosaved</div>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <div class="main-area">
      <!-- TOPBAR -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="btn-icon" id="menuToggle" style="display:none">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <h2 id="topbar-title">Projects</h2>
        </div>
        <div class="topbar-right">
          <div class="topbar-search">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" placeholder="Search..." id="globalSearch">
          </div>
          <button class="theme-toggle" id="themeToggle" title="Toggle theme">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <div class="avatar" id="userAvatar">EN</div>
        </div>
      </div>

      <!-- SCREEN: Projects Dashboard -->
      <div class="screen active" id="screen-projects">
        <div class="content screen-scroll">
          <div class="projects-header">
            <h1>Your Projects</h1>
            <button class="btn btn-primary" id="newProjectBtn">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              New Project
            </button>
          </div>
          <div id="projects-container"></div>
        </div>
      </div>

      <!-- SCREEN: Kanban Board -->
      <div class="screen" id="screen-board">
        <div class="board-topbar">
          <div class="board-topbar-left">
            <button class="btn-icon back-btn" id="backToProjects" title="Back to projects">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="board-title-group">
              <h2 id="board-project-title">Project</h2>
              <p id="board-project-desc">Description</p>
            </div>
          </div>
          <div class="board-topbar-right">
            <div class="topbar-search">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
              <input type="text" placeholder="Search tasks..." id="boardSearch">
            </div>
            <button class="btn btn-secondary" id="filterBtn">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
              Filter
            </button>
            <button class="btn btn-primary" id="addTaskBtn">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
              Add Task
            </button>
          </div>
        </div>
        <div class="board" id="board"></div>
      </div>

      <!-- SCREEN: Settings -->
      <div class="screen" id="screen-settings">
        <div class="content screen-scroll" id="settings-content"></div>
      </div>
    </div>
  </div>

  <!-- MODAL: New/Edit Project -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 id="projectModalTitle">New Project</h2>
        <button class="modal-close" data-close="projectModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="projectNameInput">Project Name</label>
          <input type="text" id="projectNameInput" placeholder="e.g. Website Redesign" maxlength="60">
        </div>
        <div class="form-group">
          <label for="projectDescInput">Short Description</label>
          <textarea id="projectDescInput" placeholder="Brief project description..." rows="2" maxlength="200"></textarea>
        </div>
        <div class="form-group">
          <label>Project Color</label>
          <div class="color-options" id="projectColorOptions"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="projectModal">Cancel</button>
        <button class="btn btn-primary" id="projectModalSave">Create Project</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Task -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="taskModalTitle">Add Task</h2>
        <button class="modal-close" data-close="taskModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="taskTitleInput">Title</label>
          <input type="text" id="taskTitleInput" placeholder="Task title" maxlength="100">
        </div>
        <div class="form-group">
          <label for="taskDescInput">Description</label>
          <textarea id="taskDescInput" placeholder="Describe the task..." rows="3" maxlength="500"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskPriorityInput">Priority</label>
            <select id="taskPriorityInput">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskDueInput">Due Date</label>
            <input type="date" id="taskDueInput">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="taskLabelInput">Label</label>
            <select id="taskLabelInput">
              <option value="">None</option>
              <option value="design">Design</option>
              <option value="frontend">Frontend</option>
              <option value="backend">Backend</option>
              <option value="bug">Bug</option>
              <option value="feature">Feature</option>
            </select>
          </div>
          <div class="form-group">
            <label for="taskAssigneeInput">Assignee</label>
            <input type="text" id="taskAssigneeInput" placeholder="Name" maxlength="40">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="taskDeleteBtn" style="display:none;margin-right:auto">Delete</button>
        <button class="btn btn-secondary" data-close="taskModal">Cancel</button>
        <button class="btn btn-primary" id="taskModalSave">Add Task</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Confirm -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Confirm</h2>
        <button class="modal-close" data-close="confirmModal">&times;</button>
      </div>
      <div class="modal-body"><p id="confirmMessage">Are you sure?</p></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="confirmModal">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <!-- Side Panel: Task Detail -->
  <div class="side-panel-overlay" id="taskPanelOverlay"></div>
  <div class="side-panel" id="taskPanel">
    <div class="side-panel-header">
      <h2 id="panelTaskTitle">Task Detail</h2>
      <button class="btn-icon" id="closePanelBtn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="side-panel-body" id="panelBody"></div>
    <div class="side-panel-footer">
      <button class="btn btn-danger" id="panelDeleteBtn">Delete Task</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" id="panelEditBtn">Edit</button>
        <button class="btn btn-primary" id="panelCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
